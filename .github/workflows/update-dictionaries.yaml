name: Update word lists

on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

env:
  # Set to "true" to auto-publish instead of opening a PR
  AUTO_PUBLISH: "false"

concurrency:
  group: update-dictionaries
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update rbxts package list
        run: pnpm exec tsx scripts/get-all-packages.ts

        working-directory: dictionaries/rbxts
      - name: Update wally package list
        run: pnpm exec tsx scripts/get-all-packages.ts

        working-directory: dictionaries/wally
      - name: Build dictionaries
        run: pnpm turbo run build

      - id: diff
        name: Check for changes
        run: |
          CHANGED=""
          if ! git diff --quiet dictionaries/rbxts/src/rbxts.txt; then
            CHANGED="${CHANGED}rbxts "
          fi
          if ! git diff --quiet dictionaries/wally/src/wally.txt; then
            CHANGED="${CHANGED}wally "
          fi
          if [ -z "$CHANGED" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "packages=$CHANGED" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.diff.outputs.changed == 'true'
        name: Create changesets
        run: |
          PACKAGES="${{ steps.diff.outputs.packages }}"
          if [[ "$PACKAGES" == *"rbxts"* ]]; then
            cat > .changeset/update-rbxts-$(date +%Y%m%d).md << 'CHANGESET'
          ---
          "@isentinel/dict-rbxts": patch
          ---

          Update rbxts word list from npm registry
          CHANGESET
          fi
          if [[ "$PACKAGES" == *"wally"* ]]; then
            cat > .changeset/update-wally-$(date +%Y%m%d).md << 'CHANGESET'
          ---
          "@isentinel/dict-wally": patch
          ---

          Update wally word list from wally index
          CHANGESET
          fi

      - env:
          GH_TOKEN: ${{ github.token }}
        if: steps.diff.outputs.changed == 'true' && env.AUTO_PUBLISH == 'false'
        name: Open PR
        run: |
          BRANCH="chore/update-dictionaries-$(date +%Y%m%d)-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update word lists (${{ steps.diff.outputs.packages }})"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: update word lists" \
            --body "Automated update of dictionary word lists: ${{ steps.diff.outputs.packages }}"

      - if: steps.diff.outputs.changed == 'true' && env.AUTO_PUBLISH == 'true'
        name: Commit updated word lists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dictionaries/rbxts/src dictionaries/rbxts/dict dictionaries/wally/src dictionaries/wally/dict .changeset
          git commit -m "chore: update word lists (${{ steps.diff.outputs.packages }})"
          git push

      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        if: steps.diff.outputs.changed == 'true' && env.AUTO_PUBLISH == 'true'
        name: Publish
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          commit: "chore: version packages"
          publish: pnpm changeset publish --provenance
          title: "chore: version packages"
