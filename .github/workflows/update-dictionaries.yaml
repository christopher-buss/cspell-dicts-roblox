name: Update word lists

on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: update-dictionaries
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update rbxts package list
        run: pnpm exec tsx scripts/get-all-packages.ts
        working-directory: dictionaries/rbxts

      - name: Update wally package list
        run: pnpm exec tsx scripts/get-all-packages.ts
        working-directory: dictionaries/wally

      - name: Update roblox word list
        run: pnpm exec tsx scripts/get-api-words.ts
        working-directory: dictionaries/roblox

      - name: Build dictionaries
        run: pnpm turbo run build

      - id: diff
        name: Check for changes
        run: |
          CHANGED=""
          if ! git diff --quiet dictionaries/rbxts/src/rbxts.txt; then
            CHANGED="${CHANGED}rbxts "
          fi
          if ! git diff --quiet dictionaries/wally/src/wally.txt; then
            CHANGED="${CHANGED}wally "
          fi
          if ! git diff --quiet dictionaries/roblox/src/roblox.txt; then
            CHANGED="${CHANGED}roblox "
          fi
          CHANGED="${CHANGED% }"
          if [ -z "$CHANGED" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "packages=$CHANGED" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.diff.outputs.changed == 'true'
        name: Create changesets
        run: |
          PACKAGES="${{ steps.diff.outputs.packages }}"
          if [[ "$PACKAGES" == *"rbxts"* ]]; then
            cat > .changeset/update-rbxts-$(date +%Y%m%d).md << 'CHANGESET'
          ---
          "@isentinel/dict-rbxts": patch
          ---

          Update rbxts word list from npm registry
          CHANGESET
          fi
          if [[ "$PACKAGES" == *"wally"* ]]; then
            cat > .changeset/update-wally-$(date +%Y%m%d).md << 'CHANGESET'
          ---
          "@isentinel/dict-wally": patch
          ---

          Update wally word list from wally index
          CHANGESET
          fi
          if [[ "$PACKAGES" == *"roblox"* ]]; then
            cat > .changeset/update-roblox-$(date +%Y%m%d).md << 'CHANGESET'
          ---
          "@isentinel/dict-roblox": patch
          ---

          Update roblox word list from Roblox API dump and Luau globals
          CHANGESET
          fi

      # Consume the changesets: bump versions and update changelogs.
      - if: steps.diff.outputs.changed == 'true'
        name: Version packages
        run: pnpm run version

      - if: steps.diff.outputs.changed == 'true'
        name: Commit to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update word lists (${{ steps.diff.outputs.packages }})"
          git push

      # Publish to npm via OIDC trusted publishing (mirrors release.yaml).
      # npx is required because pnpm's publish path lacks OIDC support.
      - env:
          GITHUB_TOKEN: ${{ github.token }}
        if: steps.diff.outputs.changed == 'true'
        name: Publish to npm
        run: |
          npx changeset publish --access public
          git push --tags
